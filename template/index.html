<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Reverse String</h1>

    <div class="input-container">
        <input type="text" id="textInput" placeholder="Enter text to reverse..." value="Hello, welcome to AI4Devs">
    </div>

    <div class="button-container">
        <button class="btn btn-reverse" onclick="reverseText()">
            Reverse
            <svg class="icon" viewBox="0 0 24 24">
                <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
            </svg>
        </button>

        <button class="btn btn-copy" onclick="copyText()">
            Copy
            <svg class="icon" viewBox="0 0 24 24">
                <path
                    d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" />
            </svg>
        </button>
    </div>

    <div class="result-container">
        <div class="result-text" id="resultText">sveD4IA ot emoclew ,olleH</div>
    </div>

    <script src="script.js"></script>
</body>

</html>
